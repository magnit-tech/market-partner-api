openapi: 3.0.3
info:
  title: Magnit Market API
  description: >
    API для партнёров Magnit Market. Позволяет управлять товарами, ценами и остатками, а также собирать и отгружать заказы. <br/>

    Доступ к API осуществляется по ключу, передаваемому в заголовке X-Api-Key.

  version: 0.1.38
servers:
  - url: 'https://b2b-api.magnit.ru'
    description: Основной стенд интеграции.
  - url: 'https://b2b-api-gateway.uat.ya.magnit.ru'
    description: Демо стенд для проведения тестирования процессинга заказов.
security:
  - apiKeyAuth: []
tags:
  - name: Товары
    description: Magnit Market API. Товары
  - name: Категории
    description: Magnit Market API. Категории
  - name: Цены
    description: Magnit Market API. Цены
  - name: Остатки
    description: Magnit Market API. Товары
  - name: Магазины
    description: Magnit Market API. Магазины
  - name: Задания на сборку
    description: Magnit Market API. Задания на сборку
  - name: Отгрузка посылок
    description: Magnit Market API. Отгрузка посылок
paths:
  /api/seller/v1/orders/list/unprocessed:
    post:
      description: >
        Возвращает список необработанных заданий на сборку за указанный период времени.

      requestBody:
        content:
          application/json:
            schema:
              allOf:
                - properties:
                    page_size:
                      default: 100
                      description: Лимит кол-ва элементов в одном ответе
                      maximum: 1000
                      minimum: 1
                      type: integer
                    page_token:
                      description: >
                        В этом параметр необходимо передавать next_page_token из предыдущего ответа.

                        Если параметр не задан возвращается первая страница с результатами.

                      type: string
                  type: object
                - properties:
                    created_at:
                      anyOf:
                        - required:
                            - from
                        - required:
                            - to
                      description: >
                        Фильтр по временному интервалу. Необходимо передать хотя бы одно поле фильтра.


                        * from Начало интервала (включительно).

                        * to   Конец интервала (не включительно).

                      properties:
                        from:
                          description: >-
                            Дата/время в формате RFC3339 с указанием часового пояса
                          example: '2024-08-24T14:15:22Z'
                          format: date-time
                          type: string
                        to:
                          description: >-
                            Дата/время в формате RFC3339 с указанием часового пояса
                          example: '2024-08-24T14:15:22Z'
                          format: date-time
                          type: string
                      type: object
                    customer_order_number:
                      description: Фильтр по клиентским номерам заказов
                      items:
                        description: Клиентский номер заказа
                        example: M12345678-00001
                        type: string
                      maxItems: 50
                      minItems: 1
                      type: array
                    cutoff_time:
                      anyOf:
                        - required:
                            - from
                        - required:
                            - to
                      description: >
                        Фильтр по временному интервалу. Необходимо передать хотя бы одно поле фильтра.


                        * from Начало интервала (включительно).

                        * to   Конец интервала (не включительно).

                      properties:
                        from:
                          description: >-
                            Дата/время в формате RFC3339 с указанием часового пояса
                          example: '2024-08-24T14:15:22Z'
                          format: date-time
                          type: string
                        to:
                          description: >-
                            Дата/время в формате RFC3339 с указанием часового пояса
                          example: '2024-08-24T14:15:22Z'
                          format: date-time
                          type: string
                      type: object
                    dir:
                      description: Направление сортировки
                      enum:
                        - ASC
                        - DESC
                      type: string
                    warehouse_id:
                      description: Фильтр по идентификаторам складов.
                      items:
                        description: Идентификатор склада
                        example: 5f6f0334-0759-4e04-af31-8c5a4c4fa7b4
                        format: uuid
                        type: string
                      maxItems: 50
                      minItems: 1
                      type: array
                  type: object
              required:
                - dir
              type: object
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                allOf:
                  - properties:
                      next_page_token:
                        description: "Токен для получения следующей страницы. \nЕго необходимо передать в поле page_token в следующем запросе.\n"
                        type: string
                    type: object
                  - properties:
                      orders:
                        items:
                          properties:
                            created_at:
                              allOf:
                                - description: >-
                                    Дата/время в формате RFC3339 с указанием часового пояса
                                  example: '2024-08-24T14:15:22Z'
                                  format: date-time
                                  type: string
                              description: |
                                Дата и время создания заказа
                            customer_id:
                              description: Идентификатор покупателя
                              example: '437080'
                              type: string
                            customer_order_number:
                              description: Клиентский номер заказа
                              example: M12345678-00001
                              type: string
                            cutoff_time:
                              allOf:
                                - description: >-
                                    Дата/время в формате RFC3339 с указанием часового пояса
                                  example: '2024-08-24T14:15:22Z'
                                  format: date-time
                                  type: string
                              description: >
                                Дата и время, до которого необходимо собрать товары в посылки и привезти их на точку drop-off

                            delivery_region:
                              description: Регион доставки
                              example: Республика Татарстан
                              type: string
                            items:
                              description: |
                                Список товаров которые необходимо собрать
                              items:
                                properties:
                                  canceled_quantity:
                                    description: >-
                                      Кол-во товаров которое было отменено при сборке.
                                    example: 1
                                    type: integer
                                  financial_data:
                                    properties:
                                      old_price:
                                        description: >-
                                          Старая цена товара. На текущий момент совпадает со значение в поле price.
                                        example: 30
                                        type: number
                                      payment_price:
                                        description: >-
                                          Цена единицы товара, которую заплатил покупатель.
                                        example: 30
                                        type: number
                                      price:
                                        description: Цена единицы товара на витрине.
                                        example: 30
                                        type: number
                                    required:
                                      - old_price
                                      - price
                                      - payment_price
                                    type: object
                                  quantity:
                                    description: >-
                                      Кол-во единиц товара которое необходимо собрать.

                                      Поле отражает актуальное кол-во товара которое необходимо собрать. Если производить отмену товаров, то значение в этом поле будет уменьшаться
                                    example: 10
                                    type: integer
                                  sku_id:
                                    example: 4323435
                                    format: int64
                                    type: integer
                                required:
                                  - sku_id
                                  - quantity
                                  - financial_data
                                type: object
                              type: array
                            order_id:
                              description: Идентификатор сборочного задания
                              maxLength: 36
                              type: string
                            status:
                              description: |
                                Статус сборочного задания

                                * NEW         - Новый
                                * IN_ASSEMBLY - Собирается
                                * ASSEMBLED   - Сборка завершена
                                * CANCELED    - Отменен
                              enum:
                                - NEW
                                - IN_ASSEMBLY
                                - ASSEMBLED
                                - CANCELED
                              type: string
                            warehouse_id:
                              description: Идентификатор склада
                              example: 5f6f0334-0759-4e04-af31-8c5a4c4fa7b4
                              format: uuid
                              type: string
                          required:
                            - order_id
                            - warehouse_id
                            - status
                            - cutoff_time
                            - created_at
                            - customer_order_number
                            - customer_id
                            - delivery_region
                            - items
                          type: object
                        type: array
                required:
                  - orders
                type: object
          description: Список заданий на сборку
        '400':
          content:
            application/json:
              schema:
                allOf:
                  - allOf:
                      - properties:
                          errors:
                            description: Список ошибок.
                            items:
                              properties:
                                message:
                                  description: Описание ошибки.
                                  type: string
                              required:
                                - message
                              type: object
                            type: array
                    required:
                      - errors
                    type: object
          description: Запрос содержит неправильные данные
        '403':
          content:
            application/json:
              schema:
                allOf:
                  - allOf:
                      - properties:
                          errors:
                            description: Список ошибок.
                            items:
                              properties:
                                message:
                                  description: Описание ошибки.
                                  type: string
                              required:
                                - message
                              type: object
                            type: array
                    required:
                      - errors
                    type: object
                type: object
          description: Нет доступа к запрашиваемому ресурсу
        '404':
          content:
            application/json:
              schema:
                allOf:
                  - allOf:
                      - properties:
                          errors:
                            description: Список ошибок.
                            items:
                              properties:
                                message:
                                  description: Описание ошибки.
                                  type: string
                              required:
                                - message
                              type: object
                            type: array
                    required:
                      - errors
                    type: object
                type: object
          description: Запрашиваемый ресурс не найдет
        '500':
          content:
            application/json:
              schema:
                allOf:
                  - allOf:
                      - properties:
                          errors:
                            description: Список ошибок.
                            items:
                              properties:
                                message:
                                  description: Описание ошибки.
                                  type: string
                              required:
                                - message
                              type: object
                            type: array
                    required:
                      - errors
                    type: object
                type: object
          description: Внутренняя ошибка сервера
      summary: Список необработанных заданий на сборку
      tags:
        - Задания на сборку
      x-gateway:
        auth: api_key
        scopes:
          - 'mm:b2b:all'
          - 'mm:b2b:orders-processing'
