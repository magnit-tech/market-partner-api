          in: header
          name: Accept
          required: true
          schema:
            default: application/json
            enum:
              - application/json
              - application/pdf
            type: string
      requestBody:
        content:
          application/json:
            schema:
              properties:
                document_type:
                  description: "Тип запрашиваемого документа:\n             \n* act_of_acceptance — акт приема-передачи\n* act_of_mismatch — акт о расхождениях\n* delivery_note — лист отгрузки\n"
