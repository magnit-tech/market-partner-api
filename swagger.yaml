          in: query
          name: search
          required: false
          schema:
            default: ''
            type: string
        - description: Номер страницы для пагинации
          in: query
          name: page
          required: false
          schema:
            default: 0
            format: int32
            type: integer
        - description: Количество элементов на странице
          in: query
          name: page_size
          required: false
          schema:
            default: 10
            format: int32
            type: integer
