                    - act_of_acceptance
                    - act_of_mismatch
                    - delivery_note
                  type: string
                shipment_id:
                  description: Идентификатор отгрузки
                  maxLength: 36
                  type: string
              required:
                - shipment_id
                - document_type
              type: object
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  file_content:
                    description: Содержимое документа в формате PDF
                    example: |
                      %PDF-1.3\n3 0 obj\n<</Type /Page\n...
                    type: string
                required:
                  - file_content
                type: object
            application/pdf:
              schema:
                example: |-
                  %PDF-1.3
                  3 0 obj
                  ...
