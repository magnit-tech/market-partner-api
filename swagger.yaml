  /api/seller/v1/orders/cancel-items:
    post:
      description: "Отменяемый товар не должен быть распределен по посылкам. \n\n⚠️ Это действие нельзя отменить.\n"
      requestBody:
        content:
          application/json:
            schema:
              properties:
                items:
                  items:
                    properties:
                      quantity:
                        minimum: 1
                        type: integer
                      sku_id:
                        example: 4323435
                        format: int64
                        type: integer
                    required:
                      - sku_id
                      - quantity
                    type: object
                  type: array
                order_id:
                  description: Идентификатор сборочного задания
                  maxLength: 36
                  type: string
              required:
                - items
                - order_id
              type: object
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  order:
                    properties:
                      created_at:
                        allOf:
                          - description: >-
                              Дата/время в формате RFC3339 с указанием часового пояса
                            example: '2024-08-24T14:15:22Z'
                            format: date-time
                            type: string
                        description: |
                          Дата и время создания заказа
                      customer_id:
                        description: Идентификатор покупателя
                        example: '437080'
                        type: string
                      customer_order_number:
                        description: Клиентский номер заказа
                        example: M12345678-00001
                        type: string
                      cutoff_time:
                        allOf:
                          - description: >-
                              Дата/время в формате RFC3339 с указанием часового пояса
                            example: '2024-08-24T14:15:22Z'
                            format: date-time
                            type: string
                        description: >
                          Дата и время, до которого необходимо собрать товары в посылки и привезти их на точку drop-off

                      delivery_region:
                        description: Регион доставки
                        example: Республика Татарстан
                        type: string
                      items:
                        description: |
                          Список товаров которые необходимо собрать
                        items:
                          properties:
                            canceled_quantity:
                              description: Кол-во товаров которое было отменено при сборке.
                              example: 1
                              type: integer
                            financial_data:
                              properties:
                                old_price:
                                  description: >-
                                    Старая цена товара. На текущий момент совпадает со значение в поле price.
                                  example: 30
                                  type: number
                                payment_price:
                                  description: >-
                                    Цена единицы товара, которую заплатил покупатель.
                                  example: 30
                                  type: number
                                price:
                                  description: Цена единицы товара на витрине.
                                  example: 30
