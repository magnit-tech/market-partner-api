components:
  securitySchemes:
    apiKeyAuth:
      type: apiKey
      in: header
      name: X-Api-Key
  schemas:
    ApiErrorResponse:
      allOf:
        - properties:
            errors:
              description: Список ошибок.
              items:
                properties:
                  message:
                    description: Описание ошибки.
                    type: string
                required:
                  - message
                type: object
              type: array
      required:
        - errors
      type: object
    CreateParcel:
      properties:
        items:
          items:
            properties:
              identifiers:
                items:
                  description: Идентификаторы для товара
                  properties:
                    cis:
                      description: Маркировка Честный знак
                      type: string
                    gtd:
                      description: Номер грузовой таможенной декларации (ГТД)
                      type: string
                    rnpt:
                      description: Регистрационный номер партии товара (РНПТ)
                      type: string
                    uin:
                      description: >-
                        Уникальный идентификационный номер (УИН) ювелирного изделия
                      type: string
                  type: object
                type: array
              quantity:
                minimum: 1
                type: integer
              sku_id:
                example: 4323435
                format: int64
                type: integer
            required:
              - sku_id
              - quantity
            type: object
          type: array
      required:
        - items
      type: object
    FilterDateTime:
      anyOf:
        - required:
            - from
        - required:
            - to
      description: >
        Фильтр по временному интервалу. Необходимо передать хотя бы одно поле фильтра.


        * from Начало интервала (включительно).

        * to   Конец интервала (не включительно).

      properties:
        from:
          description: Дата/время в формате RFC3339 с указанием часового пояса
          example: '2024-08-24T14:15:22Z'
          format: date-time
          type: string
        to:
          description: Дата/время в формате RFC3339 с указанием часового пояса
          example: '2024-08-24T14:15:22Z'
          format: date-time
          type: string
      type: object
    Order:
      properties:
        created_at:
          allOf:
            - description: Дата/время в формате RFC3339 с указанием часового пояса
              example: '2024-08-24T14:15:22Z'
              format: date-time
              type: string
          description: |
            Дата и время создания заказа
        customer_id:
          description: Идентификатор покупателя
          example: '437080'
          type: string
        customer_order_number:
          description: Клиентский номер заказа
          example: M12345678-00001
          type: string
        cutoff_time:
          allOf:
            - description: Дата/время в формате RFC3339 с указанием часового пояса
              example: '2024-08-24T14:15:22Z'
              format: date-time
              type: string
          description: >
            Дата и время, до которого необходимо собрать товары в посылки и привезти их на точку drop-off

        delivery_region:
          description: Регион доставки
          example: Республика Татарстан
          type: string
        items:
          description: |
            Список товаров которые необходимо собрать
          items:
            properties:
              canceled_quantity:
                description: Кол-во товаров которое было отменено при сборке.
                example: 1
                type: integer
              financial_data:
                properties:
                  old_price:
                    description: >-
                      Старая цена товара. На текущий момент совпадает со значение в поле price.
                    example: 30
                    type: number
                  payment_price:
                    description: 'Цена единицы товара, которую заплатил покупатель.'
                    example: 30
                    type: number
                  price:
                    description: Цена единицы товара на витрине.
                    example: 30
                    type: number
                required:
                  - old_price
                  - price
                  - payment_price
                type: object
              quantity:
                description: >-
                  Кол-во единиц товара которое необходимо собрать.

                  Поле отражает актуальное кол-во товара которое необходимо собрать. Если производить отмену товаров, то значение в этом поле будет уменьшаться
                example: 10
                type: integer
              sku_id:
                example: 4323435
                format: int64
                type: integer
            required:
              - sku_id
              - quantity
              - financial_data
            type: object
          type: array
        order_id:
          description: Идентификатор сборочного задания
          maxLength: 36
          type: string
        status:
          description: |
            Статус сборочного задания

            * NEW         - Новый
            * IN_ASSEMBLY - Собирается
            * ASSEMBLED   - Сборка завершена
            * CANCELED    - Отменен
          enum:
            - NEW
            - IN_ASSEMBLY
            - ASSEMBLED
            - CANCELED
          type: string
        warehouse_id:
          description: Идентификатор склада
          example: 5f6f0334-0759-4e04-af31-8c5a4c4fa7b4
          format: uuid
          type: string
      required:
        - order_id
        - warehouse_id
        - status
        - cutoff_time
        - created_at
        - customer_order_number
        - customer_id
        - delivery_region
        - items
      type: object
