                          description: Название или заголовок характеристики
                          example: Цвет
                          type: string
                        value:
                          description: Значение характеристики
                          example: Красный
                          type: string
                      required:
                        - id
                        - title
                        - value
                      type: object
                    type: array
                  characteristic_title:
                    description: 'Название характеристики, связанной со словарем'
                    example: Размер
                    type: string
                  dictionary_id:
                    description: Уникальный идентификатор словаря
                    example: 1
                    format: int64
                    type: integer
                  pagination:
                    description: Детали пагинации для ответа словаря
                    properties:
                      page:
                        description: Номер текущей страницы
                        example: 0
                        format: int32
                        minimum: 0
                        type: integer
                      page_size:
                        description: Количество элементов на странице
                        example: 10
                        format: int32
                        maximum: 50
                        type: integer
                    required:
                      - page
                      - page_size
                    type: object
                  system_characteristic:
                    description: 'Флаг, указывающий, является ли характеристика системной'
                    example: true
                    type: boolean
