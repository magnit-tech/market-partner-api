<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Magnit Market Partner API Reference</title>
    <style>body{margin:0}</style>
  </head>
  <body>
    <div id="app"></div>

    <script src="./js/api-reference.js"></script>

    <script>
		Scalar.createApiReference('#app', {
  			url: './swagger.yaml',
  			agent: { disabled: true },
			showDeveloperTools: 'never',
  			telemetry: false,
            showApiClient: false
		})
    </script>
    <script src="./js/scalar-ru-patch.js"></script>
    <script>
        ScalarRuPatch.init({ debug: false, hookShadowDom: true });
    </script>
  </body>
</html>
